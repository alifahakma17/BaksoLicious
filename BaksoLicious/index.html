<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BaksoLicious - Masuk</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://kit.fontawesome.com/a2d9b6b3c2.js" crossorigin="anonymous"></script>
</head>
<body class="bg-cream">
  <div class="login-page">
    <div class="left">
      <img src="assets/bakso.svg" alt="bakso" class="big-bowl">
      <div class="brand">
        <img src="assets/logo.svg" class="small-logo">
        <h1>BaksoLicious</h1>
        <p>Sistem Administrasi Digital<br>untuk Restoran Bakso</p>
      </div>
    </div>
    <div class="right">
      <div class="card">
        <h2>Selamat Datang!</h2>
        <p class="muted">Masuk untuk melanjutkan</p>
        <form id="loginForm">
          <label>Email</label>
          <div class="input-icon">
            <i class="fa fa-envelope"></i>
            <input type="email" id="email" placeholder="Masukkan email" required>
          </div>
          <label>Kata Sandi</label>
          <div class="input-icon">
            <i class="fa fa-lock"></i>
            <input type="password" id="password" placeholder="Masukkan kata sandi" required>
            <button type="button" class="eye" id="togglePwd"><i class="fa fa-eye"></i></button>
          </div>
          <div class="row between">
            <label class="checkbox"><input type="checkbox" id="remember"> Ingat saya</label>
            <a href="#" id="forgot">Lupa Kata Sandi?</a>
          </div>
          <button class="btn primary" type="submit">Masuk</button>
          <p class="muted center">Belum memiliki akun? <a href="#" id="registerLink">Daftar</a></p>
        </form>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="js/auth.js"></script>
</body>
</html>
